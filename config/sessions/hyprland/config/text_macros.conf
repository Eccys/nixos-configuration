# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  ◈ TEXT MACROS (Pasting via type_text.sh script for instant & error-free typing)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Win+Alt+E -> Email 1
bind = $mainMod ALT, E, exec, ~/.config/hypr/scripts/type_text.sh MACRO_EMAIL_1

# Win+Alt+R -> Email 3
bind = $mainMod ALT, R, exec, ~/.config/hypr/scripts/type_text.sh MACRO_EMAIL_3

# Win+Alt+P -> Password 1
bind = $mainMod ALT, P, exec, ~/.config/hypr/scripts/type_text.sh MACRO_PASS_1

# Win+Alt+U -> Password Base64 1
bind = $mainMod ALT, U, exec, ~/.config/hypr/scripts/type_text.sh MACRO_PASS_BASE64_1

# Win+Alt+N -> Password Base64 2
bind = $mainMod ALT, N, exec, ~/.config/hypr/scripts/type_text.sh MACRO_PASS_BASE64_2

# Win+Alt+A -> Name 1
bind = $mainMod ALT, A, exec, ~/.config/hypr/scripts/type_text.sh MACRO_NAME_1

# Win+Alt+Z -> Name 2
bind = $mainMod ALT, Z, exec, ~/.config/hypr/scripts/type_text.sh MACRO_NAME_2

# Win+Alt+F -> Username 1
bind = $mainMod ALT, F, exec, ~/.config/hypr/scripts/type_text.sh MACRO_USER_1

# Win+Alt+L -> Username 2
bind = $mainMod ALT, L, exec, ~/.config/hypr/scripts/type_text.sh MACRO_USER_2

# Win+Alt+S -> Email 2
bind = $mainMod ALT, S, exec, ~/.config/hypr/scripts/type_text.sh MACRO_EMAIL_2

# Win+Alt+B -> City 1
bind = $mainMod ALT, B, exec, ~/.config/hypr/scripts/type_text.sh MACRO_CITY_1

# Win+Alt+C -> City 2
bind = $mainMod ALT, C, exec, ~/.config/hypr/scripts/type_text.sh MACRO_CITY_2

# Win+Alt+D -> Current date (output of date command)
bind = $mainMod ALT, D, exec, ~/.config/hypr/scripts/type_text.sh "date" cmd

# Win+Alt+G -> Open gemini.google
bind = $mainMod ALT, G, exec, xdg-open https://gemini.google
